<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DataPath · Trilha Analista de Dados</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
:root {
  --bg: #070b14;
  --bg2: #0d1321;
  --bg3: #111827;
  --bg4: #1a2234;
  --border: #1e2d47;
  --accent: #00e5ff;
  --accent2: #7c3aed;
  --accent3: #f59e0b;
  --green: #10b981;
  --red: #ef4444;
  --text: #e2e8f0;
  --muted: #64748b;
  --muted2: #94a3b8;
  --card-radius: 12px;
  --font-main: 'Syne', sans-serif;
  --font-mono: 'Space Mono', monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font-main);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:var(--accent2)}
a{color:var(--accent);text-decoration:none}
button{cursor:pointer;font-family:var(--font-main)}
code,pre{font-family:var(--font-mono)}

/* ─── LAYOUT ─── */
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{
  width:280px;min-width:280px;background:var(--bg2);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  transition:transform .3s ease;z-index:100;overflow:hidden
}
#main{flex:1;overflow-y:auto;display:flex;flex-direction:column}

/* ─── SIDEBAR ─── */
.sidebar-header{
  padding:20px;border-bottom:1px solid var(--border);
  background:linear-gradient(135deg,#0d1321,#111827)
}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.logo-icon{
  width:38px;height:38px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0
}
.logo-text{font-size:20px;font-weight:800;letter-spacing:-.5px}
.logo-text span{color:var(--accent)}
.xp-bar-wrap{margin-top:4px}
.xp-label{font-size:11px;color:var(--muted);margin-bottom:6px;display:flex;justify-content:space-between}
.xp-bar{background:var(--border);border-radius:99px;height:6px;overflow:hidden}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width .5s ease}

.search-wrap{padding:12px 20px;border-bottom:1px solid var(--border)}
.search-input{
  width:100%;background:var(--bg3);border:1px solid var(--border);
  border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;
  font-family:var(--font-main);outline:none;transition:border-color .2s
}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--muted)}

#nav{flex:1;overflow-y:auto;padding:12px 10px}
.module-nav-item{margin-bottom:4px}
.module-nav-btn{
  width:100%;background:none;border:none;padding:10px 12px;
  border-radius:8px;display:flex;align-items:center;gap:10px;
  color:var(--muted2);font-size:13px;font-weight:600;text-align:left;
  transition:all .2s;cursor:pointer
}
.module-nav-btn:hover{background:var(--bg3);color:var(--text)}
.module-nav-btn.active{background:var(--bg4);color:var(--accent);border-left:3px solid var(--accent)}
.module-nav-btn .mod-icon{font-size:16px;flex-shrink:0}
.module-nav-btn .mod-progress{
  margin-left:auto;font-size:10px;background:var(--bg);
  padding:2px 6px;border-radius:99px;color:var(--muted);font-family:var(--font-mono)
}
.module-nav-btn.complete .mod-progress{background:var(--green);color:#fff}
.lessons-nav{padding:0 0 4px 28px;display:none}
.lessons-nav.open{display:block}
.lesson-nav-btn{
  width:100%;background:none;border:none;padding:6px 10px;
  border-radius:6px;text-align:left;font-size:12px;color:var(--muted);
  transition:all .2s;cursor:pointer;display:flex;align-items:center;gap:6px
}
.lesson-nav-btn:hover{color:var(--text)}
.lesson-nav-btn.active{color:var(--accent)}
.lesson-nav-btn.done::before{content:'✓ ';color:var(--green)}

/* ─── TOPBAR ─── */
#topbar{
  padding:16px 24px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:16px;background:var(--bg2);
  position:sticky;top:0;z-index:50;flex-shrink:0
}
#menu-btn{
  display:none;background:none;border:none;color:var(--text);
  font-size:20px;padding:4px;line-height:1
}
.breadcrumb{font-size:13px;color:var(--muted);flex:1}
.breadcrumb strong{color:var(--text)}
.stats-row{display:flex;align-items:center;gap:12px}
.stat-chip{
  display:flex;align-items:center;gap:5px;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:99px;padding:4px 10px;font-size:12px;
  font-family:var(--font-mono)
}
.stat-chip .val{color:var(--accent);font-weight:700}

/* ─── CONTENT AREA ─── */
#content-area{flex:1;padding:32px 32px 80px}

/* ─── HOME DASHBOARD ─── */
.home-header{margin-bottom:36px}
.home-title{font-size:36px;font-weight:800;line-height:1.2;margin-bottom:8px}
.home-title span{
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent
}
.home-subtitle{color:var(--muted2);font-size:16px}
.modules-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:20px;margin-bottom:36px
}
.module-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--card-radius);padding:24px;
  transition:all .25s;cursor:pointer;position:relative;overflow:hidden
}
.module-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--module-color,var(--accent)),transparent)
}
.module-card:hover{border-color:var(--module-color,var(--accent));transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,229,255,.08)}
.module-card-icon{font-size:28px;margin-bottom:12px}
.module-card-title{font-size:16px;font-weight:700;margin-bottom:6px}
.module-card-desc{font-size:13px;color:var(--muted2);margin-bottom:16px;line-height:1.6}
.module-card-meta{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--muted)}
.level-badge{
  background:var(--bg3);border:1px solid var(--border);
  padding:2px 8px;border-radius:99px;font-family:var(--font-mono)
}
.module-card-progress{margin-top:14px}
.mini-bar{background:var(--border);border-radius:99px;height:4px;overflow:hidden}
.mini-fill{height:100%;background:var(--module-color,var(--accent));border-radius:99px;transition:width .5s}
.progress-pct{font-size:11px;color:var(--muted);margin-top:4px;text-align:right;font-family:var(--font-mono)}

/* ─── LESSON VIEW ─── */
.lesson-header{margin-bottom:28px}
.module-tag{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--bg3);border:1px solid var(--border);
  padding:4px 12px;border-radius:99px;font-size:12px;
  color:var(--muted2);margin-bottom:12px
}
.lesson-title{font-size:28px;font-weight:800;line-height:1.3;margin-bottom:8px}
.lesson-meta{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:13px}

.lesson-body{max-width:800px}
.lesson-section{margin-bottom:32px}
.section-title{
  font-size:18px;font-weight:700;margin-bottom:14px;
  display:flex;align-items:center;gap:8px;color:var(--accent)
}
.section-title::before{
  content:'';width:4px;height:20px;background:var(--accent);border-radius:99px
}
.lesson-body p{
  font-size:15px;line-height:1.8;color:var(--muted2);margin-bottom:14px
}
.lesson-body strong{color:var(--text)}
.lesson-body ul,ol{
  padding-left:20px;margin-bottom:14px
}
.lesson-body li{
  font-size:15px;line-height:1.8;color:var(--muted2);margin-bottom:4px
}

.info-box{
  background:rgba(0,229,255,.05);border:1px solid rgba(0,229,255,.2);
  border-radius:10px;padding:16px 18px;margin-bottom:20px;
  font-size:14px;color:var(--text);line-height:1.7
}
.info-box.warning{background:rgba(245,158,11,.05);border-color:rgba(245,158,11,.25);color:var(--accent3)}
.info-box.success{background:rgba(16,185,129,.05);border-color:rgba(16,185,129,.25);color:var(--green)}
.info-box strong{display:block;margin-bottom:4px;font-size:13px;text-transform:uppercase;letter-spacing:.5px;opacity:.7}

.code-block{
  background:#1a1f2e;border:1px solid var(--border);
  border-radius:10px;overflow:hidden;margin-bottom:20px
}
.code-header{
  padding:10px 16px;background:var(--bg3);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;font-size:12px
}
.code-lang{color:var(--accent);font-family:var(--font-mono);font-weight:700}
.copy-btn{
  background:none;border:1px solid var(--border);color:var(--muted);
  padding:3px 10px;border-radius:5px;font-size:11px;transition:all .2s
}
.copy-btn:hover{background:var(--bg4);color:var(--text)}
.code-block pre{margin:0 !important;border-radius:0 !important;background:transparent !important}
.code-block pre code{padding:16px !important;font-size:13px !important;line-height:1.6 !important}

/* ─── EXERCISES ─── */
.exercises-section{margin-top:40px;border-top:1px solid var(--border);padding-top:32px}
.ex-header{font-size:20px;font-weight:800;margin-bottom:24px;display:flex;align-items:center;gap:10px}
.ex-header::after{
  content:'Exercícios';font-size:11px;background:var(--accent2);
  color:#fff;padding:2px 8px;border-radius:99px;font-weight:600
}
.exercise-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--card-radius);padding:24px;margin-bottom:16px
}
.ex-num{font-size:11px;color:var(--muted);font-family:var(--font-mono);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.ex-question{font-size:15px;font-weight:600;margin-bottom:18px;line-height:1.6;color:var(--text)}
.ex-code{
  background:var(--bg);border:1px solid var(--border);
  border-radius:8px;padding:12px 16px;margin-bottom:18px;
  font-size:13px;font-family:var(--font-mono);color:var(--muted2);
  overflow-x:auto;line-height:1.6
}
.options-grid{display:flex;flex-direction:column;gap:8px}
.option-btn{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:8px;padding:12px 16px;text-align:left;
  color:var(--muted2);font-size:14px;transition:all .2s;
  display:flex;align-items:flex-start;gap:10px
}
.option-btn .opt-letter{
  width:24px;height:24px;border-radius:50%;background:var(--bg);
  border:1px solid var(--border);flex-shrink:0;display:flex;
  align-items:center;justify-content:center;font-size:12px;
  font-family:var(--font-mono);font-weight:700;margin-top:-1px
}
.option-btn:hover:not(:disabled){background:var(--bg4);border-color:var(--accent);color:var(--text)}
.option-btn.correct{background:rgba(16,185,129,.1);border-color:var(--green);color:var(--green)}
.option-btn.incorrect{background:rgba(239,68,68,.1);border-color:var(--red);color:var(--red)}
.option-btn:disabled{cursor:not-allowed}
.ex-feedback{
  margin-top:14px;padding:14px 16px;border-radius:8px;font-size:14px;
  line-height:1.6;display:none
}
.ex-feedback.show{display:block}
.ex-feedback.correct-fb{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.25);color:var(--green)}
.ex-feedback.incorrect-fb{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);color:var(--muted2)}
.ex-feedback.incorrect-fb .fb-title{color:var(--red)}
.fb-title{font-weight:700;margin-bottom:4px}

/* ─── NAVIGATION BUTTONS ─── */
.lesson-nav-row{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:48px;padding-top:24px;border-top:1px solid var(--border);
  gap:12px
}
.nav-btn{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:10px;padding:12px 20px;color:var(--text);
  font-size:14px;font-family:var(--font-main);font-weight:600;
  transition:all .2s;display:flex;align-items:center;gap:8px
}
.nav-btn:hover{border-color:var(--accent);color:var(--accent)}
.nav-btn.primary{background:linear-gradient(135deg,var(--accent2),#5b21b6);border:none;color:#fff}
.nav-btn.primary:hover{filter:brightness(1.15)}
.nav-btn:disabled{opacity:.3;cursor:not-allowed}

/* ─── SQL PLAYGROUND ─── */
.sql-playground{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--card-radius);overflow:hidden;margin-bottom:20px
}
.sql-tabs{
  display:flex;border-bottom:1px solid var(--border);background:var(--bg3)
}
.sql-tab{
  padding:10px 20px;font-size:13px;font-weight:600;background:none;border:none;
  color:var(--muted);transition:all .2s;cursor:pointer;border-bottom:2px solid transparent
}
.sql-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.sql-tab-panel{display:none;padding:16px}
.sql-tab-panel.active{display:block}
.sql-editor{
  width:100%;background:var(--bg);border:1px solid var(--border);
  border-radius:8px;padding:14px;font-family:var(--font-mono);font-size:13px;
  color:var(--text);resize:vertical;min-height:100px;line-height:1.6;
  outline:none;transition:border-color .2s
}
.sql-editor:focus{border-color:var(--accent)}
.sql-run-btn{
  margin-top:10px;background:linear-gradient(135deg,var(--accent2),#5b21b6);
  border:none;color:#fff;padding:10px 24px;border-radius:8px;
  font-size:14px;font-weight:700;font-family:var(--font-main);transition:all .2s
}
.sql-run-btn:hover{filter:brightness(1.15)}
.sql-result{
  margin-top:14px;background:var(--bg);border:1px solid var(--border);
  border-radius:8px;overflow-x:auto;font-size:12px
}
.sql-result table{width:100%;border-collapse:collapse}
.sql-result th{
  background:var(--bg3);padding:8px 14px;text-align:left;
  border-bottom:1px solid var(--border);color:var(--accent);
  font-family:var(--font-mono);font-size:11px;white-space:nowrap
}
.sql-result td{
  padding:8px 14px;border-bottom:1px solid var(--border);
  color:var(--muted2);font-family:var(--font-mono);white-space:nowrap
}
.sql-result tr:last-child td{border-bottom:none}
.sql-result tr:hover td{background:var(--bg2)}
.sql-error{color:var(--red);padding:12px;font-family:var(--font-mono);font-size:13px}
.sql-success-msg{color:var(--green);padding:12px;font-family:var(--font-mono);font-size:13px}

/* ─── PROGRESS PAGE ─── */
.progress-page{padding:32px}
.big-stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px;margin-bottom:32px}
.big-stat{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--card-radius);padding:20px;text-align:center
}
.big-stat .val{font-size:32px;font-weight:800;color:var(--accent);display:block;font-family:var(--font-mono)}
.big-stat .lbl{font-size:12px;color:var(--muted);margin-top:4px}
.module-progress-list{display:flex;flex-direction:column;gap:12px}
.module-prog-item{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:10px;padding:16px 20px
}
.module-prog-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.module-prog-icon{font-size:20px}
.module-prog-title{font-size:14px;font-weight:700;flex:1}
.module-prog-pct{font-size:13px;font-family:var(--font-mono);color:var(--accent);font-weight:700}
.prog-bar-full{background:var(--border);height:6px;border-radius:99px;overflow:hidden}
.prog-bar-fill{height:100%;border-radius:99px;transition:width .8s ease}

/* ─── CHEATSHEET ─── */
.cheatsheet-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px}
.cs-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--card-radius);padding:20px
}
.cs-title{font-size:14px;font-weight:700;margin-bottom:14px;color:var(--accent);
  display:flex;align-items:center;gap:8px}
.cs-table{width:100%;border-collapse:collapse;font-size:12px}
.cs-table td{
  padding:6px 10px;border-bottom:1px solid var(--border);
  font-family:var(--font-mono);color:var(--muted2);vertical-align:top
}
.cs-table td:first-child{color:var(--text);font-weight:700;white-space:nowrap}
.cs-table tr:last-child td{border-bottom:none}

/* ─── MOBILE ─── */
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:99}
@media(max-width:768px){
  #menu-btn{display:flex}
  #sidebar{position:fixed;top:0;left:0;height:100%;transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  #sidebar-overlay.show{display:block}
  #content-area{padding:20px 16px 80px}
  .home-title{font-size:26px}
  .modules-grid{grid-template-columns:1fr}
  .lesson-title{font-size:22px}
  .stats-row{display:none}
  .lesson-nav-row{flex-direction:column}
  .nav-btn{width:100%;justify-content:center}
  .cheatsheet-grid{grid-template-columns:1fr}
}

/* ─── LOADER ─── */
#sql-loader{
  display:none;text-align:center;padding:20px;
  color:var(--muted);font-size:13px;font-family:var(--font-mono)
}
.loading-dots::after{
  content:'.';animation:dots 1.5s infinite;font-size:20px
}
@keyframes dots{0%,100%{content:'.'}33%{content:'..'}66%{content:'...'}}

/* ─── COMPLETION BADGE ─── */
.completion-banner{
  background:linear-gradient(135deg,rgba(16,185,129,.1),rgba(0,229,255,.05));
  border:1px solid rgba(16,185,129,.3);border-radius:var(--card-radius);
  padding:20px;text-align:center;margin-bottom:24px;display:none
}
.completion-banner.show{display:block}
.completion-banner h3{color:var(--green);font-size:18px;margin-bottom:4px}
.completion-banner p{color:var(--muted2);font-size:14px}

/* ─── FLOATING TOC ─── */
.toc-wrap{
  position:sticky;top:20px;float:right;width:200px;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:10px;padding:14px;margin-left:24px;margin-bottom:24px;
  font-size:12px
}
.toc-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.toc-item{
  padding:5px 0;border-bottom:1px solid var(--border);
  color:var(--muted2);cursor:pointer;transition:color .15s
}
.toc-item:last-child{border:none}
.toc-item:hover{color:var(--accent)}
@media(max-width:1100px){.toc-wrap{display:none}}

/* ─── QUIZ SCORE ─── */
.quiz-score-card{
  background:linear-gradient(135deg,var(--bg2),var(--bg3));
  border:1px solid var(--border);border-radius:var(--card-radius);
  padding:24px;text-align:center;margin-top:24px
}
.quiz-score-num{font-size:48px;font-weight:800;color:var(--accent);font-family:var(--font-mono)}
.quiz-score-label{color:var(--muted2);font-size:14px;margin-top:4px}
.quiz-score-stars{font-size:28px;margin:8px 0}

/* ─── TAGS ─── */
.tag{
  display:inline-block;background:var(--bg3);border:1px solid var(--border);
  border-radius:99px;padding:2px 8px;font-size:11px;color:var(--muted);
  margin:2px;font-family:var(--font-mono)
}
.tag.skill{border-color:var(--accent2);color:var(--accent2)}
.skills-gained{margin-top:20px;padding:14px;background:var(--bg3);border-radius:10px}
.skills-gained h4{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
</style>
</head>
<body>
<div id="app">

<!-- SIDEBAR OVERLAY -->
<div id="sidebar-overlay" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->
<nav id="sidebar">
  <div class="sidebar-header">
    <div class="logo">
      <div class="logo-icon">📊</div>
      <div class="logo-text">Data<span>Path</span></div>
    </div>

def calcular_variacao(valor_atual, valor_anterior):
    """
    Calcula a variação percentual entre dois valores.
    Retorna float com a variação em %.
    """
    if valor_anterior == 0:
        return None  # evita divisão por zero
    return ((valor_atual - valor_anterior) / valor_anterior) * 100

var_jan = calcular_variacao(15000, 12000)

def analisar_serie(dados: list):
    """Retorna estatísticas básicas de uma série numérica."""
    if not dados:
        return None, None, None, None
    return (
        min(dados),
        max(dados),
        sum(dados) / len(dados),
        sorted(dados)[len(dados)//2]  # mediana simples

vendas = pd.DataFrame({
    'mes': ['Jan','Jan','Fev','Fev','Mar','Mar'],

    'vendas': [1200, 800, 1500, 900, 1100, 1300],
    'custo': [800, 500, 950, 600, 700, 850]
})

# === GROUPBY BÁSICO ===
por_regiao = vendas.groupby('regiao')['vendas'].sum()
print(por_regiao)

resumo = vendas.groupby('regiao').agg(

)
print(resumo)

    values='vendas',
    index='mes',

)
print(pivot)

      code:`-- Estrutura das tabelas:

-- === INNER JOIN ===
-- Apenas pedidos COM cliente E produto cadastrado
SELECT 
    p.id_pedido,
    c.nome AS cliente,
    pr.nome AS produto,
    pr.preco_unit * p.quantidade AS valor_total
FROM pedidos p
INNER JOIN clientes c ON p.id_cliente = c.id_cliente
INNER JOIN produtos pr ON p.id_produto = pr.id_produto
ORDER BY valor_total DESC;

-- === LEFT JOIN ===
-- Todos os clientes, mesmo sem pedidos
SELECT 
    c.nome,
    c.segmento,
    COUNT(p.id_pedido) AS qtd_pedidos,
    COALESCE(SUM(pr.preco_unit * p.quantidade), 0) AS total_gasto
FROM clientes c
LEFT JOIN pedidos p ON c.id_cliente = p.id_cliente
LEFT JOIN produtos pr ON p.id_produto = pr.id_produto
GROUP BY c.id_cliente, c.nome, c.segmento
ORDER BY total_gasto DESC;

        <p>Funções de agregação transformam múltiplas linhas em um único valor resumido. São a base de qualquer análise de negócio.</p>

        <p><strong>Funções de agregação principais:</strong></p>
        <ul>
          <li><code>COUNT(*)</code> — conta todas as linhas</li>
          <li><code>COUNT(coluna)</code> — conta valores não-NULL</li>
          <li><code>COUNT(DISTINCT coluna)</code> — conta valores únicos</li>
          <li><code>SUM(coluna)</code> — soma</li>
          <li><code>AVG(coluna)</code> — média</li>
          <li><code>MIN() / MAX()</code> — mínimo e máximo</li>
          <li><code>STRING_AGG() / GROUP_CONCAT()</code> — concatena strings</li>
        </ul>

        <p><strong>HAVING vs WHERE:</strong><br>
        WHERE filtra linhas antes do GROUP BY. HAVING filtra grupos depois do GROUP BY. Só pode usar funções de agregação no HAVING, nunca no WHERE.</p>

        <div class="info-box"><strong>💡 Regra do GROUP BY</strong>Toda coluna no SELECT que NÃO seja uma função de agregação deve aparecer no GROUP BY. Esta é a regra mais importante (e mais quebrada por iniciantes)!</div>

      codeTitle:'Agregações avançadas',
      code:`-- Vendas por categoria com múltiplas métricas
SELECT 
    categoria,
    COUNT(*) AS qtd_vendas,
    COUNT(DISTINCT id_cliente) AS clientes_unicos,
    SUM(valor) AS receita_total,
    AVG(valor) AS ticket_medio,
    MIN(valor) AS menor_venda,
    MAX(valor) AS maior_venda,
    ROUND(SUM(valor) * 100.0 / SUM(SUM(valor)) OVER (), 2) AS pct_receita
FROM vendas
GROUP BY categoria
HAVING SUM(valor) > 10000  -- apenas categorias com >10k em receita
ORDER BY receita_total DESC;

-- Análise de cohort mensal
SELECT 
    strftime('%Y-%m', data) AS mes,
    COUNT(*) AS qtd_pedidos,
    COUNT(DISTINCT id_cliente) AS clientes_ativos,
    SUM(valor) AS receita,
    ROUND(AVG(valor), 2) AS ticket_medio,
    ROUND(SUM(valor) / COUNT(DISTINCT id_cliente), 2) AS receita_por_cliente
FROM vendas

      theory:`
        <p>Window Functions são uma das funcionalidades mais poderosas do SQL. Permitem calcular valores relacionando cada linha com um conjunto de linhas próximas, sem colapsar o resultado como GROUP BY faz.</p>

        <p><strong>Sintaxe base:</strong><br>
        <code>FUNÇÃO() OVER (PARTITION BY col ORDER BY col ROWS/RANGE BETWEEN ...)</code></p>

        <p><strong>Funções de Ranking:</strong></p>
        <ul>
          <li><code>ROW_NUMBER()</code> — numeração única (sem empate)</li>
          <li><code>RANK()</code> — com empate, pula posições</li>
          <li><code>DENSE_RANK()</code> — com empate, sem pular posições</li>
          <li><code>NTILE(n)</code> — divide em n grupos (quartis, decis)</li>
        </ul>

        <p><strong>Funções de Offset:</strong></p>
        <ul>
          <li><code>LAG(col, n)</code> — valor n linhas ANTES (MoM, YoY)</li>
          <li><code>LEAD(col, n)</code> — valor n linhas DEPOIS</li>
          <li><code>FIRST_VALUE() / LAST_VALUE()</code></li>
        </ul>

        <p><strong>Funções de Agregação como Window:</strong> SUM, AVG, COUNT, MAX — mas mantendo todas as linhas!</p>

        <div class="info-box"><strong>💡 Casos de Uso Reais</strong>Crescimento MoM (LAG), running total (SUM acumulado), top-N por categoria (ROW_NUMBER), percentual do total (SUM OVER / SUM()), percentis (NTILE), primeira/última compra por cliente (FIRST_VALUE).</div>

      codeTitle:'Window Functions na prática real',
      code:`-- === RANKING POR CATEGORIA ===
-- Top 3 produtos por receita em cada categoria
WITH ranked AS (
    SELECT 
        produto,
        categoria,
        SUM(valor) AS receita,
        ROW_NUMBER() OVER (
            PARTITION BY categoria 
            ORDER BY SUM(valor) DESC
        ) AS ranking
    FROM vendas
    GROUP BY produto, categoria
)
SELECT * FROM ranked WHERE ranking <= 3;

-- === CRESCIMENTO MÊS A MÊS ===
WITH vendas_mes AS (
    SELECT strftime('%Y-%m', data) AS mes, SUM(valor) AS receita
    FROM vendas GROUP BY 1
)
SELECT 
    mes,
    receita,
    LAG(receita) OVER (ORDER BY mes) AS receita_mes_anterior,
    ROUND((receita - LAG(receita) OVER (ORDER BY mes)) 
          / LAG(receita) OVER (ORDER BY mes) * 100, 1) AS crescimento_pct,
    SUM(receita) OVER (ORDER BY mes) AS receita_acumulada
FROM vendas_mes;

-- === PERCENTUAL SOBRE TOTAL ===
SELECT 
    categoria,
    SUM(valor) AS receita,
    ROUND(SUM(valor) * 100.0 / SUM(SUM(valor)) OVER (), 2) AS pct_total,
    NTILE(4) OVER (ORDER BY SUM(valor)) AS quartil
FROM vendas
GROUP BY categoria;`,

      theory:`
        <p>Estatística descritiva resume e descreve as características principais de um conjunto de dados. É o primeiro passo em qualquer análise.</p>

        <p><strong>Medidas de Tendência Central:</strong></p>
        <ul>
          <li><strong>Média</strong> — soma / quantidade. Sensível a outliers.</li>
          <li><strong>Mediana</strong> — valor central quando ordenado. Robusta a outliers.</li>
          <li><strong>Moda</strong> — valor mais frequente. Usada para dados categóricos.</li>

        <p><strong>Medidas de Dispersão:</strong></p>
        <ul>
          <li><strong>Variância (σ²)</strong> — média dos quadrados dos desvios</li>
          <li><strong>Desvio Padrão (σ)</strong> — raiz da variância (mesma unidade dos dados)</li>
          <li><strong>Amplitude</strong> — max - min</li>
          <li><strong>IQR (Intervalo Interquartil)</strong> — Q3 - Q1 (robusto a outliers)</li>
        </ul>

        <p><strong>Distribuição e Formato:</strong></p>
        <ul>
          <li><strong>Assimetria (Skewness)</strong> — positiva = cauda à direita; negativa = cauda à esquerda</li>
          <li><strong>Curtose (Kurtosis)</strong> — "altura" dos picos vs caudas</li>
          <li><strong>Boxplot</strong> — visualiza Q1, Q2, Q3, bigodes e outliers</li>

        <div class="info-box"><strong>💡 Média vs Mediana</strong>Salário médio no Brasil soa alto por causa de alguns salários altíssimos que "puxam" a média. A mediana é mais representativa da experiência da maioria. Use mediana para dados com outliers (renda, preços de imóveis, tempo de resposta).</div>

      code:`import pandas as pd
import numpy as np
from scipy import stats

# Dados de salário (com outliers - CEO ganha muito mais)
salarios = [3500, 4200, 3800, 5100, 4500, 3200, 4800, 3900, 4100, 150000]

# === MEDIDAS DE TENDÊNCIA CENTRAL ===
media = np.mean(salarios)
mediana = np.median(salarios)
moda = stats.mode(salarios)

print(f"Média:   R$ {media:,.0f}")    # distorcida pelo CEO
print(f"Mediana: R$ {mediana:,.0f}") # mais representativa
print(f"Moda:    R$ {moda.mode[0]:,.0f}")

# === MEDIDAS DE DISPERSÃO ===

      code:`import pandas as pd
import sqlite3

from datetime import datetime
import logging

# === CONFIGURAÇÃO DE LOGGING ===
logging.basicConfig(
    level=logging.INFO,
    format='%(asctime)s - %(levelname)s - %(message)s'
)

class ETLPipeline:
    """Pipeline ETL modular e reutilizável."""
    
    def __init__(self, db_path='warehouse.db'):
        self.db_path = db_path
        self.conn = sqlite3.connect(db_path)
    
    # ─── EXTRACT ───
    def extract_csv(self, path: str) -> pd.DataFrame:
        logging.info(f"Extraindo CSV: {path}")
        try:
            df = pd.read_csv(path)
            logging.info(f"  {len(df)} linhas extraídas")
            return df
        except Exception as e:
            logging.error(f"Erro na extração: {e}")
            raise
    
    def extract_api(self, url: str, params: dict = None) -> pd.DataFrame:
        logging.info(f"Extraindo API: {url}")
        response = requests.get(url, params=params, timeout=30)
        response.raise_for_status()
        return pd.DataFrame(response.json())
    
    # ─── TRANSFORM ───
    def transform(self, df: pd.DataFrame) -> pd.DataFrame:
        logging.info("Iniciando transformações...")
        original_count = len(df)
        
        # 1. Remover duplicatas
        df = df.drop_duplicates()
        
        # 2. Padronizar colunas
        df.columns = df.columns.str.lower().str.replace(' ', '_')
        
        # 3. Tratar tipos
        if 'data' in df.columns:
            df['data'] = pd.to_datetime(df['data'], errors='coerce')
        if 'valor' in df.columns:
            df['valor'] = pd.to_numeric(df['valor'], errors='coerce')
        
        # 4. Remover nulos críticos
        df = df.dropna(subset=[c for c in ['id', 'data', 'valor'] if c in df.columns])
        
        # 5. Adicionar metadata
        df['_processado_em'] = datetime.now()
        df['_fonte'] = 'etl_pipeline_v1'
        
        logging.info(f"  {original_count} → {len(df)} linhas após transform")
        return df
    
    # ─── VALIDATE ───
    def validate(self, df: pd.DataFrame) -> bool:
        checks = {
            'Sem nulos críticos': df['valor'].isnull().sum() == 0 if 'valor' in df.columns else True,
            'Datas válidas': df['data'].isnull().sum() == 0 if 'data' in df.columns else True,
            'Valores positivos': (df['valor'] >= 0).all() if 'valor' in df.columns else True,
        }
        for check, result in checks.items():
            status = "✅" if result else "❌"
            logging.info(f"  {status} {check}")
        return all(checks.values())
    
    # ─── LOAD ───
    def load(self, df: pd.DataFrame, table: str, if_exists='append'):
        logging.info(f"Carregando {len(df)} linhas em '{table}'")
        df.to_sql(table, self.conn, if_exists=if_exists, index=False)
        logging.info(f"  ✅ Carregamento concluído!")

# === EXECUTANDO O PIPELINE ===

def buscar_dados_api(endpoint: str, api_key: str, paginas: int = 3):
    """Busca dados de API com paginação e retry."""
    todos_dados = []
    
    for pagina in range(1, paginas + 1):
        for tentativa in range(3):  # retry 3x
            try:
                response = requests.get(
                    endpoint,
                    params={'page': pagina, 'per_page': 100},
                    headers={'Authorization': f'Bearer {api_key}'},
                    timeout=10
                )
                response.raise_for_status()
                dados = response.json()
                todos_dados.extend(dados.get('items', []))
                time.sleep(0.5)  # respeitar rate limit
                break
            except requests.exceptions.HTTPError as e:
                if response.status_code == 429:  # rate limit
                    time.sleep(2 ** tentativa)   # exponential backoff
                    continue
                raise
    
    return pd.DataFrame(todos_dados)

let state = {
  currentPage: 'home',

  streak: parseInt(localStorage.getItem('dp_streak') || '0'),
  lastVisit: localStorage.getItem('dp_last') || null
};

function saveState() {
  localStorage.setItem('dp_progress', JSON.stringify(state.progress));
  localStorage.setItem('dp_xp', state.xp);
  localStorage.setItem('dp_streak', state.streak);
  localStorage.setItem('dp_last', new Date().toDateString());
}

// ═══════════════════════════════════════════════════════
//  PROGRESS HELPERS
// ═══════════════════════════════════════════════════════
function isLessonDone(lessonId) { return !!state.progress[lessonId]; }
function markLessonDone(lessonId) {
  if (!state.progress[lessonId]) {
    state.progress[lessonId] = true;
    state.xp += 100;
    saveState();
    updateStats();
  }
}
function getModuleProgress(module) {
  const done = module.lessons.filter(l => isLessonDone(l.id)).length;
  return { done, total: module.lessons.length, pct: Math.round(done/module.lessons.length*100) };
}
function getTotalDone() {
  return Object.keys(state.progress).filter(k => state.progress[k]).length;
}
function getTotalLessons() {
  return CURRICULUM.reduce((a, m) => a + m.lessons.length, 0);
}
function getXPLevel() {
  const levels = [0,500,1200,2500,4500,7500];
  for (let i = levels.length - 1; i >= 0; i--) {
    if (state.xp >= levels[i]) return { level: i+1, min: levels[i], max: levels[i+1] || levels[i]+2500 };
  }
  return { level: 1, min: 0, max: 500 };
}

// ═══════════════════════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════════════════════
function updateStats() {
  const lv = getXPLevel();
  document.getElementById('xp-level').textContent = `Nível ${lv.level}`;
  document.getElementById('xp-val').textContent = `${state.xp} XP`;
  const pct = ((state.xp - lv.min) / (lv.max - lv.min)) * 100;
  document.getElementById('xp-bar').style.width = Math.min(pct, 100) + '%';
  document.getElementById('xp-stat').textContent = state.xp;
  document.getElementById('done-val').textContent = getTotalDone();
  document.getElementById('streak-val').textContent = state.streak;
}

function buildSidebar() {
  const nav = document.getElementById('nav');
  nav.innerHTML = '';
  CURRICULUM.forEach(module => {
    const prog = getModuleProgress(module);
    const div = document.createElement('div');
    div.className = 'module-nav-item';
    div.innerHTML = `
      <button class="module-nav-btn ${prog.done === prog.total && prog.total > 0 ? 'complete' : ''}"
              onclick="toggleModuleNav('lessons-${module.id}', '${module.id}')">
        <span class="mod-icon">${module.icon}</span>
        <span>${module.title}</span>
        <span class="mod-progress">${prog.done}/${prog.total}</span>
      </button>
      <div class="lessons-nav" id="lessons-${module.id}">
        ${module.lessons.map(l => `
          <button class="lesson-nav-btn ${isLessonDone(l.id)?'done':''}"
                  onclick="navigateTo('lesson','${module.id}','${l.id}')">
            ${l.title}
          </button>
        `).join('')}
      </div>
    `;
    nav.appendChild(div);
  });
}

function toggleModuleNav(navId, moduleId) {
  const el = document.getElementById(navId);
  const isOpen = el.classList.contains('open');
  document.querySelectorAll('.lessons-nav').forEach(e => e.classList.remove('open'));
  if (!isOpen) el.classList.add('open');
}

function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  sidebar.classList.toggle('open');
  overlay.classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('show');
}

function setBreadcrumb(parts) {
  document.getElementById('breadcrumb').innerHTML = parts.join(' › ');
}

//  NAVIGATION
// ═══════════════════════════════════════════════════════
function navigateTo(page, moduleId = null, lessonId = null) {
  state.currentPage = page;
  state.currentModuleId = moduleId;
  state.currentLessonId = lessonId;
  closeSidebar();
  render();
  window.scrollTo(0, 0);
}

function render() {
  const area = document.getElementById('content-area');
  if (state.currentPage === 'home') {
    renderHome(area);
  } else if (state.currentPage === 'lesson') {
    const module = CURRICULUM.find(m => m.id === state.currentModuleId);
    const lesson = module?.lessons.find(l => l.id === state.currentLessonId);
    if (module && lesson) renderLesson(area, module, lesson);
  } else if (state.currentPage === 'progress') {
    renderProgress(area);
  } else if (state.currentPage === 'cheatsheet') {
    renderCheatsheet(area);
  }
  buildSidebar();
}

function renderExercises(lesson) {
  const exercises = lesson.exercises;
  let html = `
    <div class="exercises-section">
      <div class="ex-header">Pratique o que aprendeu</div>
  `;
  
  exercises.forEach((ex, idx) => {
    const letters = ['A', 'B', 'C', 'D'];
    html += `
      <div class="exercise-card" id="ex-${lesson.id}-${idx}">

        <div class="ex-question">${ex.q}</div>
        ${ex.code ? `<div class="ex-code">${escHtml(ex.code)}</div>` : ''}
        <div class="options-grid">

            <button class="option-btn" 
                    onclick="answerEx('${lesson.id}',${idx},${i},${ex.correct})"

              ${opt}
            </button>
          `).join('')}
        </div>
        <div class="ex-feedback" id="ex-fb-${lesson.id}-${idx}"></div>
      </div>
    `;
  });
  
  html += `</div>`;
  return html;
}

function answerEx(lessonId, exIdx, selected, correct) {
  const opts = document.querySelectorAll(`[id^="ex-opt-${lessonId}-${exIdx}-"]`);
  opts.forEach(btn => btn.disabled = true);
  
  opts[selected].classList.add(selected === correct ? 'correct' : 'incorrect');
  if (selected !== correct) opts[correct].classList.add('correct');
  
  const lesson = CURRICULUM.flatMap(m => m.lessons).find(l => l.id === lessonId);
  const ex = lesson?.exercises[exIdx];
  
  const fb = document.getElementById(`ex-fb-${lessonId}-${exIdx}`);
  fb.classList.add('show');
  if (selected === correct) {
    fb.className = 'ex-feedback show correct-fb';
    fb.innerHTML = `<div class="fb-title">✅ Correto!</div>${ex.exp}`;
    state.xp += 20;
    updateStats();
    saveState();
  } else {
    fb.className = 'ex-feedback show incorrect-fb';
    fb.innerHTML = `<div class="fb-title">❌ Incorreto</div>${ex.exp}`;
  }
}

function completeLessonAndContinue(moduleId, lessonId, nextLessonId) {
  markLessonDone(lessonId);
  buildSidebar();
  if (nextLessonId) {
    navigateTo('lesson', moduleId, nextLessonId);
  } else {
    // Check if there's a next module
    const moduleIdx = CURRICULUM.findIndex(m => m.id === moduleId);
    const nextModule = CURRICULUM[moduleIdx + 1];
    if (nextModule) {
      navigateTo('lesson', nextModule.id, nextModule.lessons[0].id);
    } else {
      navigateTo('home');
    }
  }
}

let sqlDB = null;

function buildPlayground(moduleId, lessonId) {
  const defaultQueries = {
    'm3l1': 'SELECT produto, categoria, valor, quantidade\nFROM vendas\nWHERE categoria = "Tech"\nORDER BY valor DESC\nLIMIT 5;',
    'm3l2': 'SELECT v.produto, c.nome AS cliente, v.valor\nFROM vendas v\nINNER JOIN clientes c ON v.id_cliente = c.id\nORDER BY v.valor DESC;',
    'm3l3': 'SELECT categoria,\n  COUNT(*) AS qtd,\n  ROUND(AVG(valor), 2) AS ticket_medio,\n  SUM(valor) AS receita_total\nFROM vendas\nGROUP BY categoria\nORDER BY receita_total DESC;',
    'm3l4': `WITH top_clientes AS (\n  SELECT id_cliente, SUM(valor) AS total\n  FROM vendas GROUP BY id_cliente\n)\nSELECT c.nome, t.total\nFROM top_clientes t\nJOIN clientes c ON t.id_cliente = c.id\nORDER BY total DESC LIMIT 5;`,
    'm3l5': 'SELECT produto, categoria, valor,\n  SUM(valor) OVER (PARTITION BY categoria) AS total_categoria,\n  ROUND(valor * 100.0 / SUM(valor) OVER (PARTITION BY categoria), 1) AS pct_cat,\n  ROW_NUMBER() OVER (PARTITION BY categoria ORDER BY valor DESC) AS rank_cat\nFROM vendas\nORDER BY categoria, rank_cat;'
  };
  
  const key = moduleId + lessonId.replace(moduleId, '');
  const query = defaultQueries[lessonId] || defaultQueries[moduleId + lessonId] || 'SELECT * FROM vendas LIMIT 10;';
  
  return `
    <div class="lesson-section">
      <div class="section-title">SQL Playground Interativo</div>
      <div class="sql-playground">
        <div class="sql-tabs">
          <button class="sql-tab active" onclick="switchTab(this,'tab-query-${lessonId}')">Editor SQL</button>
          <button class="sql-tab" onclick="switchTab(this,'tab-schema-${lessonId}')">Schema do Banco</button>
          <button class="sql-tab" onclick="switchTab(this,'tab-tips-${lessonId}')">Dicas</button>
        </div>
        <div id="tab-query-${lessonId}" class="sql-tab-panel active">
          <textarea class="sql-editor" id="sql-editor-${lessonId}" rows="7">${query}</textarea>
          <button class="sql-run-btn" onclick="runSQL('${lessonId}')">▶ Executar Query</button>
          <div id="sql-loader-${lessonId}" class="sql-result" style="display:none;padding:14px;color:var(--muted);font-size:13px">Carregando banco de dados... <span class="loading-dots"></span></div>
          <div id="sql-result-${lessonId}" class="sql-result" style="display:none"></div>
        </div>
        <div id="tab-schema-${lessonId}" class="sql-tab-panel">
          <div style="font-size:13px;line-height:2;font-family:var(--font-mono)">
            <strong style="color:var(--accent)">vendas</strong> (id INTEGER, data TEXT, produto TEXT, categoria TEXT, valor REAL, quantidade INTEGER, id_cliente INTEGER, regiao TEXT)<br>
            <strong style="color:var(--accent)">clientes</strong> (id INTEGER, nome TEXT, cidade TEXT, segmento TEXT, email TEXT)<br>
            <strong style="color:var(--accent)">produtos</strong> (id INTEGER, nome TEXT, categoria TEXT, preco REAL, estoque INTEGER)
          </div>
        </div>
        <div id="tab-tips-${lessonId}" class="sql-tab-panel">
          <div style="font-size:13px;line-height:2;color:var(--muted2)">
            💡 Use <code style="color:var(--accent)">SELECT *</code> para ver todas as colunas<br>
            💡 Sempre use <code style="color:var(--accent)">LIMIT</code> para não sobrecarregar<br>
            💡 Erros aparecem em vermelho abaixo do editor<br>
            💡 Use ; no final das queries<br>
            💡 Funções: COUNT, SUM, AVG, MIN, MAX, ROUND<br>
            💡 O banco tem ~200 registros de exemplo
          </div>
        </div>
      </div>
    </div>
  `;
}

function switchTab(btn, tabId) {
  const playground = btn.closest('.sql-playground');
  playground.querySelectorAll('.sql-tab').forEach(t => t.classList.remove('active'));
  playground.querySelectorAll('.sql-tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(tabId).classList.add('active');
}

async function initSQL() {
  if (sqlLoaded) return;
  return new Promise((resolve, reject) => {
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.min.js';
    script.onload = async () => {
      try {
        const SQL = await initSqlJs({
          locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/${file}`
        });
        sqlDB = new SQL.Database();
        seedDB();
        sqlLoaded = true;
        resolve();
      } catch(e) { reject(e); }
    };
    document.head.appendChild(script);
  });
}

function seedDB() {

      data TEXT,
      produto TEXT,
      categoria TEXT,
      valor REAL,
      quantidade INTEGER,
      id_cliente INTEGER,
      regiao TEXT

    CREATE TABLE IF NOT EXISTS clientes (
      id INTEGER PRIMARY KEY,
      nome TEXT,
      cidade TEXT,
      segmento TEXT,
      email TEXT
    );
    CREATE TABLE IF NOT EXISTS produtos (
      id INTEGER PRIMARY KEY,
      nome TEXT,
      categoria TEXT,
      preco REAL,
      estoque INTEGER
    );
  `);
  
  const produtos_data = [
    ['Notebook Pro', 'Tech', 2499.99, 45],

    ['Carol Lima', 'Belo Horizonte', 'Enterprise', 'carol@corp.com'],
    ['Diego Souza', 'São Paulo', 'SMB', 'diego@startup.com'],
    ['Eva Costa', 'Porto Alegre', 'Enterprise', 'eva@grande.com'],
    ['Felipe Neto', 'Recife', 'SMB', 'felipe@me.com'],
    ['Gabriela Ramos', 'Fortaleza', 'SMB', 'gabi@mail.com'],
    ['Henrique Lopes', 'Manaus', 'Enterprise', 'henrique@amazon.com'],
  ];
  
  produtos_data.forEach((p, i) => {
    sqlDB.run('INSERT OR IGNORE INTO produtos VALUES (?,?,?,?,?)', [i+1, ...p]);
  });
  clientes_data.forEach((c, i) => {
    sqlDB.run('INSERT OR IGNORE INTO clientes VALUES (?,?,?,?,?)', [i+1, ...c]);
  });
  
  const datas = ['2024-01-15','2024-01-22','2024-02-03','2024-02-18','2024-03-05',
                 '2024-03-20','2024-04-02','2024-04-17','2024-05-08','2024-05-25',

async function runSQL(lessonId) {
  const editor = document.getElementById(`sql-editor-${lessonId}`);
  const resultEl = document.getElementById(`sql-result-${lessonId}`);
  const loaderEl = document.getElementById(`sql-loader-${lessonId}`);
  const query = editor.value.trim();
  
  if (!query) return;
  
  resultEl.style.display = 'none';
  loaderEl.style.display = 'block';
  
  try {
    if (!sqlLoaded) await initSQL();
    loaderEl.style.display = 'none';
    resultEl.style.display = 'block';
    
    const results = sqlDB.exec(query);
    
    if (results.length === 0) {
      resultEl.innerHTML = `<div class="sql-success-msg">✅ Query executada com sucesso! (sem linhas retornadas)</div>`;
      return;
    }
    
    const { columns, values } = results[0];
    const maxRows = 50;
    const shown = values.slice(0, maxRows);
    
    let html = `<table>
      <thead><tr>${columns.map(c => `<th>${c}</th>`).join('')}</tr></thead>
      <tbody>
        ${shown.map(row => `<tr>${row.map(v => `<td>${v === null ? '<em style="color:var(--muted)">NULL</em>' : v}</td>`).join('')}</tr>`).join('')}
      </tbody>
    </table>`;
    
    if (values.length > maxRows) {
      html += `<div style="padding:8px 14px;font-size:11px;color:var(--muted);border-top:1px solid var(--border)">
        Mostrando ${maxRows} de ${values.length} linhas
      </div>`;
    } else {
      html += `<div style="padding:8px 14px;font-size:11px;color:var(--muted);border-top:1px solid var(--border)">
        ${values.length} linha${values.length !== 1 ? 's' : ''} retornada${values.length !== 1 ? 's' : ''}
      </div>`;
    }
    
    resultEl.innerHTML = html;
  } catch (err) {
    loaderEl.style.display = 'none';
    resultEl.style.display = 'block';
    resultEl.innerHTML = `<div class="sql-error">❌ Erro SQL: ${escHtml(err.message)}</div>`;
  }
}

function handleSearch(query) {
  const nav = document.getElementById('nav');
  if (!query.trim()) { buildSidebar(); return; }
  
  const q = query.toLowerCase();
  nav.innerHTML = '';
  
  CURRICULUM.forEach(module => {
    module.lessons.forEach(lesson => {
      if (lesson.title.toLowerCase().includes(q) || module.title.toLowerCase().includes(q)) {
        const btn = document.createElement('button');
        btn.className = 'lesson-nav-btn' + (isLessonDone(lesson.id) ? ' done' : '');
        btn.style.cssText = 'width:100%;text-align:left;padding:10px 14px;background:var(--bg3);border-radius:8px;margin-bottom:4px;font-size:12px;border:1px solid var(--border);color:var(--muted2);cursor:pointer';
        btn.innerHTML = `<span style="color:var(--muted);">${module.icon}</span> ${lesson.title}`;
        btn.onclick = () => { document.getElementById('search-input').value = ''; navigateTo('lesson', module.id, lesson.id); };
        nav.appendChild(btn);
      }
    });
  });
  
  if (nav.innerHTML === '') nav.innerHTML = '<div style="padding:20px;color:var(--muted);font-size:13px;text-align:center">Nenhum resultado</div>';
}

// ═══════════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════════
function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function copyCode(btn) {
  const code = btn.closest('.code-block').querySelector('code').innerText;
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = 'Copiado!';
    setTimeout(() => btn.textContent = 'Copiar', 2000);
  });
}

// ═══════════════════════════════════════════════════════
//  STREAK TRACKING
// ═══════════════════════════════════════════════════════
function checkStreak() {
  const today = new Date().toDateString();
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  if (state.lastVisit === yesterday) {
    state.streak += 1;
  } else if (state.lastVisit !== today) {
    state.streak = 1;
  }
  state.lastVisit = today;
  saveState();
}
